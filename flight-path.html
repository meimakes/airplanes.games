<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✈️ Flight Path</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Fredoka', sans-serif;
    min-height: 100vh;
    background: linear-gradient(180deg, #4A90D9 0%, #87CEEB 50%, #B0E0F0 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hud {
    position: fixed;
    top: 12px;
    left: 70px;
    right: 12px;
    z-index: 10;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .hud-item {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 6px 14px;
    border-radius: 12px;
    white-space: nowrap;
  }
  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 75px 16px 20px;
    gap: 16px;
    width: 100%;
    max-width: 600px;
  }
  #level-banner {
    font-size: 22px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    text-align: center;
  }
  #maze-container {
    position: relative;
    background: rgba(255,255,255,0.15);
    border-radius: 16px;
    border: 3px solid rgba(255,255,255,0.3);
    overflow: hidden;
  }
  .maze-cell {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .maze-cell.wall {
    background: #5D4037;
    border: 1px solid #4E342E;
  }
  .maze-cell.path {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .maze-cell.visited {
    background: rgba(66,165,245,0.4);
  }
  .maze-cell.storm {
    background: rgba(100,100,120,0.7);
    font-size: 24px;
    line-height: 1;
  }
  .maze-cell.start {
    background: rgba(76,175,80,0.5);
  }
  .maze-cell.goal {
    background: rgba(255,152,0,0.5);
  }
  .maze-cell .goal-emoji {
    font-size: 22px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  #plane-el {
    position: absolute;
    z-index: 5;
    transition: left 0.15s ease, top 0.15s ease;
    pointer-events: none;
  }
  #plane-el img {
    display: block;
  }
  .controls {
    display: grid;
    grid-template-areas:
      ". up ."
      "left down right";
    gap: 8px;
    margin-top: 8px;
  }
  .ctrl-btn {
    width: 64px;
    height: 64px;
    border: none;
    border-radius: 16px;
    background: rgba(255,255,255,0.85);
    font-size: 28px;
    font-weight: 700;
    color: #333;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.1s;
    touch-action: manipulation;
  }
  .ctrl-btn:active {
    transform: scale(0.92);
    background: rgba(255,255,255,1);
  }
  .ctrl-btn.up { grid-area: up; }
  .ctrl-btn.down { grid-area: down; }
  .ctrl-btn.left { grid-area: left; }
  .ctrl-btn.right { grid-area: right; }
  #message-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #message-overlay.show { opacity: 1; }
  #message-overlay .msg-text {
    font-size: 56px;
    font-weight: 700;
    color: #FFD700;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    text-align: center;
  }
  .confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 40;
  }
  @media (max-width: 400px) {
    .ctrl-btn { width: 56px; height: 56px; font-size: 24px; }
  }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-item" id="level-display">Cadet</div>
  <div class="hud-item" id="moves-display">Moves: 0</div>
</div>

<canvas class="confetti-canvas" id="confetti-canvas"></canvas>
<div id="message-overlay"><div class="msg-text" id="msg-text"></div></div>

<div id="game-wrapper">
  <div id="level-banner"></div>
  <div id="maze-container"></div>
  <div class="controls">
    <button class="ctrl-btn up" onclick="move(0,-1)">↑</button>
    <button class="ctrl-btn left" onclick="move(-1,0)">←</button>
    <button class="ctrl-btn down" onclick="move(0,1)">↓</button>
    <button class="ctrl-btn right" onclick="move(1,0)">→</button>
  </div>
</div>

<script>
const planeImages = [
  { src: 'assets/plane-1.png', name: 'Cessna' },
  { src: 'assets/plane-3.png', name: 'F-16' },
  { src: 'assets/plane-7.png', name: 'Concorde' }
];

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, type = 'sine', vol = 0.12) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function playStep() { playTone(440, 0.06, 'triangle', 0.06); }
function playWall() { playTone(150, 0.15, 'square', 0.06); }
function playCelebrate() {
  playTone(523, 0.1); setTimeout(() => playTone(659, 0.1), 80);
  setTimeout(() => playTone(784, 0.1), 160);
  setTimeout(() => playTone(1047, 0.3), 240);
}

// State
let level = 0;
let moves = 0;
let playerX = 0, playerY = 0;
let goalX = 0, goalY = 0;
let grid = [];
let cols = 0, rows = 0;
let cellSize = 0;
let gameActive = false;
let visited = new Set();

const levelDefs = [
  { name: 'Cadet', size: 5, storms: 2 },
  { name: 'Pilot', size: 6, storms: 3 },
  { name: 'Captain', size: 7, storms: 4 },
  { name: 'Ace', size: 8, storms: 5 }
];

// Maze generation using recursive backtracking
// Grid values: 0 = wall, 1 = path, 2 = storm
function generateMaze(w, h) {
  // Start with all walls
  const totalW = w * 2 + 1;
  const totalH = h * 2 + 1;
  const g = Array.from({ length: totalH }, () => Array(totalW).fill(0));

  // Recursive backtracking
  const cellVisited = Array.from({ length: h }, () => Array(w).fill(false));

  function carve(cx, cy) {
    cellVisited[cy][cx] = true;
    g[cy * 2 + 1][cx * 2 + 1] = 1;

    const dirs = [[0,-1],[1,0],[0,1],[-1,0]].sort(() => Math.random() - 0.5);
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < w && ny >= 0 && ny < h && !cellVisited[ny][nx]) {
        // Remove wall between
        g[cy * 2 + 1 + dy][cx * 2 + 1 + dx] = 1;
        carve(nx, ny);
      }
    }
  }

  carve(0, h - 1); // Start carving from bottom-left

  return { grid: g, totalW, totalH };
}

function placeSolvableStorms(g, totalW, totalH, numStorms, sx, sy, gx, gy) {
  // BFS to check solvability
  function isSolvable(testGrid) {
    const q = [[sx, sy]];
    const vis = new Set();
    vis.add(`${sx},${sy}`);
    while (q.length > 0) {
      const [x, y] = q.shift();
      if (x === gx && y === gy) return true;
      for (const [dx, dy] of [[0,-1],[1,0],[0,1],[-1,0]]) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < totalW && ny >= 0 && ny < totalH &&
            testGrid[ny][nx] === 1 && !vis.has(`${nx},${ny}`)) {
          vis.add(`${nx},${ny}`);
          q.push([nx, ny]);
        }
      }
    }
    return false;
  }

  // Collect all valid path cells (not start or goal)
  const candidates = [];
  for (let y = 0; y < totalH; y++) {
    for (let x = 0; x < totalW; x++) {
      if (g[y][x] === 1 && !(x === sx && y === sy) && !(x === gx && y === gy)) {
        candidates.push([x, y]);
      }
    }
  }

  // Shuffle and try placing storms
  const shuffled = candidates.sort(() => Math.random() - 0.5);
  let placed = 0;

  for (const [x, y] of shuffled) {
    if (placed >= numStorms) break;
    g[y][x] = 2; // temporarily a storm
    if (isSolvable(g)) {
      placed++;
    } else {
      g[y][x] = 1; // revert
    }
  }
}

function startLevel() {
  const def = levelDefs[level];
  const mazeW = def.size, mazeH = def.size;
  moves = 0;
  gameActive = false;
  visited = new Set();

  document.getElementById('level-display').textContent = def.name;
  document.getElementById('level-banner').textContent = `${def.name} — ${def.size}×${def.size}`;
  document.getElementById('moves-display').textContent = 'Moves: 0';

  const { grid: g, totalW, totalH } = generateMaze(mazeW, mazeH);
  grid = g;
  cols = totalW;
  rows = totalH;

  // Start = bottom-left path cell, Goal = top-right path cell
  const startGX = 1, startGY = totalH - 2;
  const goalGX = totalW - 2, goalGY = 1;

  playerX = startGX;
  playerY = startGY;
  goalX = goalGX;
  goalY = goalGY;

  // Place storms
  placeSolvableStorms(g, totalW, totalH, def.storms, startGX, startGY, goalGX, goalGY);

  visited.add(`${playerX},${playerY}`);

  renderMaze();
  gameActive = true;
}

function renderMaze() {
  const container = document.getElementById('maze-container');
  container.innerHTML = '';

  // Calculate cell size to fit viewport
  const maxW = Math.min(window.innerWidth - 40, 500);
  const maxH = Math.min(window.innerHeight - 280, 500);
  cellSize = Math.floor(Math.min(maxW / cols, maxH / rows));
  cellSize = Math.max(cellSize, 24);

  container.style.width = (cols * cellSize) + 'px';
  container.style.height = (rows * cellSize) + 'px';

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const cell = document.createElement('div');
      cell.className = 'maze-cell';
      cell.style.left = (x * cellSize) + 'px';
      cell.style.top = (y * cellSize) + 'px';
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';

      const val = grid[y][x];
      if (val === 0) {
        cell.classList.add('wall');
      } else if (val === 2) {
        cell.classList.add('path', 'storm');
        cell.textContent = '⛈️';
        cell.style.fontSize = Math.max(14, cellSize * 0.55) + 'px';
      } else {
        cell.classList.add('path');
        if (visited.has(`${x},${y}`)) cell.classList.add('visited');
        if (x === goalX && y === goalY) {
          cell.classList.add('goal');
          cell.innerHTML = `<span class="goal-emoji" style="font-size:${Math.max(14, cellSize*0.55)}px">🛬</span>`;
        }
        if (x === playerX && y === playerY) {
          cell.classList.add('start');
        }
      }
      container.appendChild(cell);
    }
  }

  // Add plane element
  const planeEl = document.createElement('div');
  planeEl.id = 'plane-el';
  const planeImg = document.createElement('img');
  const chosenPlane = planeImages[level % planeImages.length];
  planeImg.src = chosenPlane.src;
  planeImg.alt = chosenPlane.name;
  planeImg.style.width = Math.max(20, cellSize * 0.75) + 'px';
  planeImg.style.height = Math.max(20, cellSize * 0.75) + 'px';
  planeImg.style.objectFit = 'contain';
  planeEl.appendChild(planeImg);
  planeEl.style.left = (playerX * cellSize + cellSize * 0.125) + 'px';
  planeEl.style.top = (playerY * cellSize + cellSize * 0.125) + 'px';
  container.appendChild(planeEl);
}

function move(dx, dy) {
  if (!gameActive) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const nx = playerX + dx;
  const ny = playerY + dy;

  if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) {
    playWall();
    return;
  }
  if (grid[ny][nx] === 0 || grid[ny][nx] === 2) {
    playWall();
    return;
  }

  playerX = nx;
  playerY = ny;
  moves++;
  visited.add(`${nx},${ny}`);

  document.getElementById('moves-display').textContent = `Moves: ${moves}`;
  playStep();

  // Update visited cells visually
  const cells = document.querySelectorAll('.maze-cell.path');
  cells.forEach(c => {
    const cx = Math.round(parseInt(c.style.left) / cellSize);
    const cy = Math.round(parseInt(c.style.top) / cellSize);
    if (visited.has(`${cx},${cy}`)) {
      c.classList.add('visited');
    }
  });

  // Move plane element
  const planeEl = document.getElementById('plane-el');
  if (planeEl) {
    planeEl.style.left = (playerX * cellSize + cellSize * 0.125) + 'px';
    planeEl.style.top = (playerY * cellSize + cellSize * 0.125) + 'px';
  }

  // Check win
  if (playerX === goalX && playerY === goalY) {
    gameActive = false;
    playCelebrate();
    fireConfetti();

    if (level < 3) {
      showMessage(`Landed! ✈️\n${moves} moves`, 2500);
      setTimeout(() => {
        level++;
        startLevel();
      }, 3000);
    } else {
      showMessage(`Ace Pilot! 🏆\n${moves} moves`, 3000);
      setTimeout(() => {
        level = 0;
        startLevel();
      }, 3500);
    }
  }
}

// Keyboard controls
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); move(0, -1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); move(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); move(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); move(1, 0); break;
  }
});

// Swipe support
let touchStartX = 0, touchStartY = 0;
document.getElementById('maze-container').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('maze-container').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 20) return;
  if (absDx > absDy) {
    move(dx > 0 ? 1 : -1, 0);
  } else {
    move(0, dy > 0 ? 1 : -1);
  }
}, { passive: true });

// Message overlay
let msgTimer = null;
function showMessage(text, dur) {
  const overlay = document.getElementById('message-overlay');
  document.getElementById('msg-text').textContent = text;
  overlay.classList.add('show');
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => overlay.classList.remove('show'), dur);
}

// Confetti
const confettiCanvas = document.getElementById('confetti-canvas');
const cctx = confettiCanvas.getContext('2d');
let confettiPieces = [];

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function fireConfetti() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 60; i++) {
    confettiPieces.push({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * 16,
      vy: -Math.random() * 12 - 4,
      size: 5 + Math.random() * 6,
      color: ['#FFD700','#FF4444','#44FF44','#4444FF','#FF44FF','#44FFFF'][Math.floor(Math.random()*6)],
      life: 1.5,
      rot: Math.random() * Math.PI * 2,
      rotS: (Math.random() - 0.5) * 0.3
    });
  }
}

function updateConfetti() {
  cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiPieces = confettiPieces.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.99;
    p.rot += p.rotS; p.life -= 0.012;
    if (p.life <= 0) return false;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot);
    cctx.globalAlpha = Math.min(1, p.life);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
    cctx.restore();
    return true;
  });
  cctx.globalAlpha = 1;
  requestAnimationFrame(updateConfetti);
}
requestAnimationFrame(updateConfetti);

// Handle resize
window.addEventListener('resize', () => {
  if (gameActive) renderMaze();
});

// Start
startLevel();
</script>
<script src="home-btn.js"></script>
</body>
</html>
